name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  placeholder-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository scaffold check
        run: |
          test -f README.md
          test -f .env.example
          test -f docs/vision.md
          test -f docs/architecture.md
