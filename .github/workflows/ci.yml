name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  placeholder-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository scaffold check
        run: |
          test -f README.md && echo "README.md exists" || (echo "README.md missing" && exit 1)
          test -f .env.example && echo ".env.example exists" || (echo ".env.example missing" && exit 1)
          test -f .gitignore && echo ".gitignore exists" || (echo ".gitignore missing" && exit 1)
          test -f LICENSE && echo "LICENSE exists" || (echo "LICENSE missing" && exit 1)
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md exists" || (echo "CONTRIBUTING.md missing" && exit 1)
          test -f docs/vision.md && echo "docs/vision.md exists" || (echo "docs/vision.md missing" && exit 1)
          test -f docs/architecture.md && echo "docs/architecture.md exists" || (echo "docs/architecture.md missing" && exit 1)
          echo "All scaffold files verified successfully!"
